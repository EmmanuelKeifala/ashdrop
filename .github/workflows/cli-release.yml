name: Release CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Validate release version
        id: version
        run: |
          set -euo pipefail
          version=$(ashdrop/cli/scripts/release-version.sh "$GITHUB_REF_NAME")
          printf 'version=%s\n' "$version" >>"$GITHUB_OUTPUT"
          printf 'VERSION=%s\n' "$version" >>"$GITHUB_ENV"

      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Install QEMU user emulation
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes --no-install-recommends qemu-user
          command -v qemu-aarch64 >/dev/null

      - name: Test and build release binaries
        working-directory: ashdrop/cli
        run: |
          set -euo pipefail
          zig version | grep -Fx '0.16.0'
          zig build test -Dversion="$VERSION"
          zig build -Dtarget=x86_64-linux-musl -Dcpu=baseline -Doptimize=ReleaseSafe \
            -Dversion="$VERSION" --prefix zig-out/release/linux-x86_64
          zig build -Dtarget=aarch64-linux-musl -Dcpu=baseline -Doptimize=ReleaseSafe \
            -Dversion="$VERSION" --prefix zig-out/release/linux-aarch64

      - name: Smoke-test release binaries
        working-directory: ashdrop/cli
        run: |
          set -euo pipefail
          test "$(env -u HOME zig-out/release/linux-x86_64/bin/ashdrop --version)" = "ashdrop $VERSION"
          test "$(env -u HOME qemu-aarch64 zig-out/release/linux-aarch64/bin/ashdrop --version)" = "ashdrop $VERSION"

      - name: Package and verify release artifacts
        run: |
          set -euo pipefail
          x86_archive="ashdrop-v$VERSION-linux-x86_64.tar.gz"
          arm_archive="ashdrop-v$VERSION-linux-aarch64.tar.gz"
          mkdir -p dist/stage/linux-x86_64 dist/stage/linux-aarch64
          install -m 0755 ashdrop/cli/zig-out/release/linux-x86_64/bin/ashdrop dist/stage/linux-x86_64/ashdrop
          install -m 0755 ashdrop/cli/zig-out/release/linux-aarch64/bin/ashdrop dist/stage/linux-aarch64/ashdrop
          tar --sort=name --owner=0 --group=0 --numeric-owner --mtime='UTC 1970-01-01' \
            --mode='u=rwx,go=rx' -C dist/stage/linux-x86_64 -czf "dist/$x86_archive" ashdrop
          tar --sort=name --owner=0 --group=0 --numeric-owner --mtime='UTC 1970-01-01' \
            --mode='u=rwx,go=rx' -C dist/stage/linux-aarch64 -czf "dist/$arm_archive" ashdrop
          test "$(tar -tzf "dist/$x86_archive")" = 'ashdrop'
          test "$(tar -tzf "dist/$arm_archive")" = 'ashdrop'
          cd dist
          sha256sum "$arm_archive" "$x86_archive" >SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Attest release archives
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*.tar.gz

      - name: Publish or verify GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ashdrop/cli/scripts/publish-release.sh dist

      - name: Promote CLI channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ashdrop/cli/scripts/promote-channel.sh
